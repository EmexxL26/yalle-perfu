<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Tela de Login</title>
  <!-- Responsividade para PC, notebook, tablet e Android -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f8cdda, #f1e1c6);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .saudacao {
      font-size: clamp(24px, 6vw, 42px);
      font-weight: bold;
      color: #d16ba5;
      margin-bottom: 5vh;
      text-align: center;
      animation: aparecer 1.5s ease;
    }

    .login-box {
      background: #fff;
      padding: clamp(20px, 5vw, 40px);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      width: 90%;
      max-width: 380px;
      text-align: center;
      animation: aparecer 1.5s ease;
    }

    .login-box img {
      width: 70%;
      max-width: 240px;
      height: auto;
      margin-bottom: 20px;
    }

    .login-box h2 {
      margin-bottom: 20px;
      color: #2c3e50;
      font-size: clamp(18px, 4vw, 24px);
    }

    .login-box input, .login-box button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: clamp(14px, 3.5vw, 16px);
    }

    .login-box button {
      background: linear-gradient(90deg, #d16ba5, #c777b9, #ba83ca, #aa8fd8, #9a9ae1);
      color: #fff;
      border: none;
      cursor: pointer;
      transition: transform 0.3s;
    }

    .login-box button:hover { transform: scale(1.05); }

    .clock {
      margin-top: 15px;
      font-size: clamp(14px, 4vw, 18px);
      font-weight: bold;
      color: #d16ba5;
    }

    .lembrete-sono {
      position: fixed;
      top: 15px;
      left: 15px;
      background: rgba(255, 255, 255, 0.95);
      padding: clamp(15px, 4vw, 25px);
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.3);
      font-size: clamp(14px, 4.5vw, 20px);
      font-weight: bold;
      color: #2c3e50;
      max-width: 85%;
      animation: aparecer 1.5s ease;
      display: none; /* começa oculto */
    }

    .lembrete-sono button {
      margin-top: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      background: #d16ba5;
      color: #fff;
      cursor: pointer;
      font-size: clamp(12px, 3vw, 14px);
    }

    .footer {
      position: fixed;
      bottom: 0;
      width: 100%;
      text-align: center;
      padding: 10px;
      background: rgba(255,255,255,0.7);
      font-size: clamp(12px, 3.5vw, 16px);
      font-style: italic;
      color: #2c3e50;
      animation: aparecer 2s ease;
    }

    @keyframes aparecer {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="saudacao" id="saudacao"></div>

  <div class="login-box">
    <img src="logo.png.png" alt="Logo">
    <h2>Login</h2>
    <input type="password" id="senha" placeholder="Senha">
    <button onclick="verificarSenha()">Entrar</button>
    <div id="clock" class="clock"></div>
  </div>

  <div class="footer" id="footer"></div>

  <div class="lembrete-sono" id="lembreteSono">
    🌙 "Cuide de você: dormir bem é essencial para energia, saúde e felicidade."
    <br>
    <button onclick="fecharLembrete()">OK</button>
  </div>

  <script>
    // Relógio
    function atualizarRelogio() {
      const agora = new Date();
      const data = agora.toLocaleDateString("pt-BR", { day: '2-digit', month: 'long', year: 'numeric' });
      const hora = agora.toLocaleTimeString("pt-BR");
      document.getElementById("clock").textContent = data + " | " + hora;
    }
    setInterval(atualizarRelogio, 1000);
    atualizarRelogio();

    // Saudação
    function atualizarSaudacao() {
      const hora = new Date().getHours();
      let saudacao;
      if (hora >= 6 && hora < 12) {
        saudacao = "Bom dia, Gecyelle Carvalho!";
      } else if (hora >= 12 && hora < 18) {
        saudacao = "Boa tarde, Gecyelle Carvalho!";
      } else {
        saudacao = "Boa noite, Gecyelle Carvalho!";
      }
      document.getElementById("saudacao").textContent = saudacao;
    }
    atualizarSaudacao();

    // Senha -> vai direto para inicial.html
    function verificarSenha() {
      const senha = document.getElementById("senha").value;
      if (senha === "1") {
        location.href = 'inicial.html';
      } else {
        alert("Senha incorreta! Tente novamente.");
      }
    }

    // Frases motivacionais rotativas
    const frases = [
      "Acredite em você e tudo será possível.",
      "Cada dia é uma nova chance de recomeçar.",
      "Grandes conquistas começam com pequenos passos.",
      "Persistência transforma sonhos em realidade.",
      "Você é mais forte do que imagina."
    ];
    let indice = 0;
    function atualizarFrase() {
      document.getElementById("footer").textContent = frases[indice];
      indice = (indice + 1) % frases.length;
    }
    setInterval(atualizarFrase, 4000);
    atualizarFrase();

    // Lembrete de sono só aparece depois da meia-noite
    function verificarLembreteSono() {
      const hora = new Date().getHours();
      if (hora >= 0 && hora < 6) {
        document.getElementById("lembreteSono").style.display = "block";
      } else {
        document.getElementById("lembreteSono").style.display = "none";
      }
    }
    verificarLembreteSono();

    // Fechar lembrete
    function fecharLembrete() {
      document.getElementById("lembreteSono").style.display = "none";
    }
  </script>
</body>
</html>
